<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Contact Border AI for immigration pathway questions, advisor marketplace support, document preparation, and account help." />
    <title>Contact Us · Border AI</title>
    <link rel="stylesheet" href="/website/assets/css/theme.css?v=spacing-type-tune" />
    <link rel="stylesheet" href="/website/assets/css/components.css?v=spacing-type-tune" />
  </head>
  <body data-page="contact">
    <div class="page">
      <div data-mount="navbar"></div>
      <main id="main-content">
        <section class="contact-hero">
          <div class="container">
            <p class="contact-kicker">Contact us</p>
            <h1 class="contact-title">Let’s talk about <span>Immigration &amp; Visa</span></h1>
            <p class="contact-intro">Send us some info about you and any questions, and we will get back to you as soon as we can!</p>
          </div>
        </section>
        <section class="section">
          <div class="container contact-layout">
            <form class="contact-card contact-form" action="https://formsubmit.co/zrazavi97@gmail.com" method="post">
              <input type="hidden" name="_subject" value="New Border AI contact form submission" />
              <input type="hidden" name="_template" value="table" />
              <input type="hidden" name="_captcha" value="false" />
              <div class="contact-field">
                <label for="contact-name">Full Name*</label>
                <input id="contact-name" name="Name" type="text" autocomplete="name" required />
              </div>
              <div class="contact-field">
                <label for="contact-email">Email*</label>
                <input id="contact-email" name="Email" type="email" autocomplete="email" required />
              </div>
              <div class="contact-field">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="Message" required></textarea>
              </div>
              <button class="btn btn-primary" type="submit">Contact us</button>
              <p class="contact-note">Submissions are sent to Border AI by email. Do not include sensitive documents in this form.</p>
            </form>
          </div>
        </section>
      </main>
      <div data-mount="footer"></div>
    </div>
